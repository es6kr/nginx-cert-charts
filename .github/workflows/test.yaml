name: Helm Chart Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint charts
        run: |
          helm lint charts/host-ip-service
          helm lint charts/cluster-issuers

  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v0.5.2

      - name: Run unit tests
        run: helm unittest charts/host-ip-service

  template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Template host-ip-service chart
        run: |
          helm template test-release charts/host-ip-service \
            --set namespace=test \
            --set endpoint.name=test-host \
            --set endpoint.ip=10.0.0.1 \
            --set 'endpoint.ports[0].name=http' \
            --set 'endpoint.ports[0].port=80'
