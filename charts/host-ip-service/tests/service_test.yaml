suite: service tests
templates:
  - templates/service.yaml

tests:
  - it: should create Service with correct name and namespace
    set:
      namespace: web
      endpoint:
        name: example-host
        ip: 10.0.0.100
        ports:
          - name: http
            port: 80
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: example-host
      - equal:
          path: metadata.namespace
          value: web

  - it: should create headless service (clusterIP None)
    set:
      namespace: default
      endpoint:
        name: test-host
        ip: 10.0.0.1
        ports:
          - name: http
            port: 80
    asserts:
      - equal:
          path: spec.clusterIP
          value: None

  - it: should include all ports with correct targetPort
    set:
      namespace: default
      endpoint:
        name: test-host
        ip: 10.0.0.1
        ports:
          - name: http
            port: 80
          - name: https
            port: 443
    asserts:
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: 80
      - equal:
          path: spec.ports[1].name
          value: https
      - equal:
          path: spec.ports[1].port
          value: 443
      - equal:
          path: spec.ports[1].targetPort
          value: 443

  - it: should use example test values correctly
    values:
      - example-values.yaml
    asserts:
      - equal:
          path: metadata.name
          value: example-host
      - equal:
          path: metadata.namespace
          value: web
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.ports[0].port
          value: 80
