{{- $ingress := coalesce .Values.ingress dict }}
{{- $globalAnnotations := coalesce $ingress.annotations dict }}
{{- range .Values.endpoint.ports }}
  {{- $portIngress := coalesce .ingress dict }}
  {{- $hosts := list }}
  {{- if $portIngress.hosts }}
    {{- $hosts = $portIngress.hosts }}
  {{- else if $portIngress.host }}
    {{- $hosts = list $portIngress.host }}
  {{- end }}
  {{- $portNum := .port }}
  {{- $portName := .name }}
  {{- range $host := $hosts }}
  {{- $hostSlug := $host | replace "." "-" }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-%s-%s" $.Values.endpoint.name $portName $hostSlug }}
  namespace: {{ $.Values.namespace }}
  annotations:
    {{- range $k, $v := merge $globalAnnotations (coalesce $portIngress.annotations dict) }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  ingressClassName: {{ coalesce $ingress.className "nginx" }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: {{ $portIngress.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.endpoint.name }}
                port:
                  number: {{ $portNum }}
  {{- if $ingress.tls }}
  tls:
    {{- range $ingress.tls }}
    {{- if has $host .hosts }}
    - secretName: {{ .secretName }}
      hosts:
        - {{ $host }}
    {{- end }}
    {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
